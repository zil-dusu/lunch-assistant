# ===========================================
# 开发环境配置（H2 数据库）
# 生产环境启动时加: --spring.profiles.active=prod
# ===========================================

spring:
  datasource:
    url: jdbc:h2:mem:lunchdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true       # 开发时可访问 http://localhost:8080/h2-console
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update    # 自动建表
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true  # 延迟执行data.sql，等Hibernate建表完成
  sql:
    init:
      mode: always        # 自动执行 data.sql 初始化数据
      encoding: utf-8     # 强制用UTF-8读取data.sql（否则Windows会用GBK读，导致乱码）

server:
  port: 8080

---
# ===========================================
# 生产环境配置（MySQL）
# ===========================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/lunchdb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: your_password_here
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
  h2:
    console:
      enabled: false
